; PlatformIO Project Configuration
; For Teensy 4.1 -- compile with: pio run --target upload

[env:teensy41]
platform = teensy
board = teensy41
framework = arduino
upload_port = /dev/ttyACM0
monitor_speed = 921600

build_flags =
    -DTEENSYDUINO=1
    -DUSB_SERIAL
    -DSERIAL_BUFFER_SIZE=512

lib_deps =
    ; No external libs needed for basic IMU/Servo -- built-in
    ; If using MPU6050 via I2C: add the specific library
