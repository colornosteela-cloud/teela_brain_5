# Teela v5.0 Configuration
# https://github.com/colornosteela-cloud/teela_brain_5
# ==============================================
# Hardware Truth — update this when you add components.

robot:
  id: teela-001
  name: Teela
  hardware_version: "0.2-alpha"
  capabilities:
    eyes: true           # cameras active
    ears: true           # microphone active
    neck: true           # 2 servos: pan + tilt
    legs: false          # not installed yet
    arms: false          # not installed yet
    hands: false         # not installed yet
    e_skin: false        # silicone skin not fabricated yet
    ultrasonic: false    # no HC-SR04s mounted yet
    imu: false           # no IMU wired yet
    walking: false       # no gait engine active

hardware:
  camera:
    primary_index: 0       # /dev/video0 — left eye (CSI or USB)
    secondary_index: null  # /dev/video1 — right eye (null = single camera)
    width: 640
    height: 480
    fps: 15
    # JetPack 6.x often auto-detects CSI cameras.
    # If you have dual IMX219/IMX477, set secondary_index: 1
    # To verify:
    #   ls /dev/video*
    #   v4l2-ctl -d /dev/video0 --all | head -20
    #   python3 -m teela_core.perception.camera --primary 0 --secondary 1

  microphone:
    device: "default"      # ALSA device name. Check: arecord -l
    samplerate: 16000      # Whisper expects 16kHz mono

    # ── STT Backend ─────────────────────────────
    # Recommendations (Jetson Orin Nano):
    #   "whisper_local"  → faster-whisper runs ON the Jetson GPU
    #                       No cloud latency. Private.
    #                       Install: pip install faster-whisper
    #                       Model sizes: tiny (39MB) < base (74MB) < small (244MB)
    #   "cloud_endpoint" → Remote STT API (e.g., Deepgram, AssemblyAI)
    #                       Requires subscription.
    stt_local: true           # true = use local whisper, false = use stt_endpoint below
    stt_model: "base"         # tiny | base | small | medium | large

    # stt_endpoint: "http://localhost:8000/transcribe"  # custom endpoint if not local

    block_duration_ms: 500    # audio buffer size (wake word block)
    silence_duration_ms: 1500  # end-of-utterance silence

  speaker:
    mode: edge_tts           # options: stdout | edge_tts | chatterbox
    # NOTE: set to 'stdout' for headless testing (text only, no audio)
    #       'chatterbox' loads Jade's cloned voice via Chatterbox-Turbo
    output_device: plughw:1,0  # USB speaker (card 1, device 0)
    edge_tts_voice: en-US-AvaNeural       # Modern, clear voice for Teela
    play_beep: true        # audible wake-word / acknowledgment

  serial:
    port: /dev/ttyACM0
    baud: 921600
    protocol: simple       # line-based: NECK, PING, STATUS

  servos:
    count: 2
    controller: direct    # direct PWM from Teensy 4.1 pins (PCA9685 later)
    pins: [2, 3]          # [pan, tilt]
    min_us: 500
    max_us: 2500

perception:
  # V-JEPA is optional — fall back to pure OpenCV if memory is tight
  vjepa_enabled: false
  vjepa_model: facebook/v-jepa-2

  # Moondream is lightweight enough for Jetson Nano Orin
  moondream_enabled: true
  moondream_model: vikhyatk/moondream2

  # Human pose (pointing detection) via MediaPipe
  pointing_enabled: true
  mediapipe_enabled: true

  target_fps: 10
  output_path: /tmp/scene_state.json

voice:
  # TTS Engine Selection
  #   "edge_tts"   → Cloud TTS via Microsoft Azure (FAST! <1s response)
  #                   Voices: en-US-AvaNeural, en-US-JennyNeural, etc.
  #   "chatterbox" → Chatterbox-Turbo with Jade's cloned voice (15 emotions!)
  #                   ULTRA REALISTIC but SLOW on CPU (~17 min per response)
  #                   Use for special moments, not real-time chat.
  #                   Install: pip install chatterbox-tts
  #   "stdout"     → Text only, no audio (for headless testing)
  tts_engine: edge_tts       # edge_tts | chatterbox | stdout
  voices_dir: voices/jade_cloned  # For chatterbox mode: path to cloned voices

  # Edge TTS settings (FAST real-time conversations!)
  backend: edge_tts
  prosody_enabled: true
  tts_voice: en-US-AvaNeural

  # Wake word — "Hey Teela"
  # Backends (in order of preference):
  #   "porcupine"  → Best. Offline, ~1MB, sub-200ms latency.
  #                    Free for open-source. Sign up at picovoice.ai
  #                    Requires: pip install pvporcupine + MODEL
  #                    To train custom model: picovoice.ai/console
  #   "openwakeword" → Open source ONNX. Uses ~50MB RAM.
  #                    Requires: pip install openwakeword + model
  #   "energy"       → Always works. Threshold-only. Higher false positives.
  #
  # To test: python3 -m teela_core.voice.wakeword --backend energy --duration 10
  wakeword_enabled: true
  wakeword_type: energy               # porcupine | openwakeword | energy
  wakeword_sensitivity: 0.7
  # wakeword_access_key: ""            # picovoice access key (if using porcupine)

cloud:
  provider: ollama        # ollama | kimi
  api_endpoint: http://localhost:11434
  model: kimi-k2.6:cloud  # local Ollama model
  api_key: null
  max_tokens: 512
  temperature: 0.8
  system_prompt_path: docs/TEELA_SYSTEM_PROMPT.md
  llm_provider: ollama    # used by CloudBridge: ollama | kimi
  llm_model: kimi-k2.6:cloud
  api_base: http://localhost:11434

logging:
  level: INFO
  max_size_mb: 10
  format: "[{asctime}] {levelname:8s} | {name:20s} | {message}"
  # Format keywords available: asctime, levelname, levelno, name, message, module, funcName, lineno

emotional_state:
  decay_rate: 0.95            # per tick decay (0.95 = slow, 0.5 = fast)
  max_valence: 1.0
  min_valence: -1.0
  max_arousal: 1.0
  max_dominance: 1.0

# Proactive behaviors
behavior:
  idle_check_interval: 30.0    # seconds between idle-behavior triggers
  idle_enabled: true
  curiosity_enabled: true
  social_attention_enabled: true
  max_idle_duration: 300.0   # seconds before Teela becomes "bored"

# Safety thresholds (reflex layer)
safety:
  unsafe_contact_levels:
    pinch: 0.7               # forceful grip; dangerous for fingers
    sharp: 0.8               # concentrated high-force contact
    impact: 0.9              # sudden force spike
    heat: 60.0               # degrees C skin surface

# Physical calibration
#   These get updated automatically by calibration scripts.
calibration:
  camera_height_cm: 120.0     # from ground to lens center
  arm_reach_cm: 70.0         # max reach from torso center
  hip_height_cm: 60.0         # standing joint height (for pointing math)
  camera_yaw_deg: 0.0        # mount offset from forward
  camera_pitch_deg: -10.0    # looking slightly down at floor plane
  torso_radius_cm: 25.0       # body cylinder radius
